name: build installer

run-name: installer-build-${{ github.sha }}

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js and npm
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: WebUI/package-lock.json

      - name: setup npm project
        working-directory: "WebUI"
        run: npm ci

      - name: build installer
        working-directory: "WebUI"
        run: |
          npm run fetch-external-resources
          npm run build

      - name: upload release
        uses: actions/upload-artifact@v4
        with:
          name: "installer-windows-${{ github.sha }}"
          path: build/electron/*.exe
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js and npm
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: WebUI/package-lock.json

      - name: setup npm project
        working-directory: "WebUI"
        run: npm ci

      - name: build installer
        working-directory: "WebUI"
        run: |
          npm run fetch-external-resources
          npm run build:linux

      - name: upload release
        uses: actions/upload-artifact@v4
        with:
          name: "installer-linux-${{ github.sha }}"
          path: |
            build/electron/*.AppImage
            build/electron/*.deb
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  # Publishes the built installers as public GitHub Release assets. Runs only for
  # `v*` tag pushes (manual workflow_dispatch runs just upload artifacts above).
  # The release is named after the pushed tag (e.g. v3.1.2-beta.rc1), and is
  # upserted: re-pushing/moving the tag re-triggers the build and refreshes the
  # existing release's assets in place rather than failing.
  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag="${GITHUB_REF_NAME}"
          notes="Automated build from commit ${GITHUB_SHA}."
          # download-artifact places each artifact in its own subdirectory, so
          # the installers live exactly one level deep under artifacts/.
          files=(artifacts/*/*.exe artifacts/*/*.AppImage artifacts/*/*.deb)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No installer files found to attach to the release."
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Refreshing existing release $tag"
            gh release edit "$tag" --prerelease --notes "$notes"
            gh release upload "$tag" "${files[@]}" --clobber
          else
            echo "Creating release $tag"
            gh release create "$tag" --title "$tag" --prerelease --notes "$notes" "${files[@]}"
          fi
